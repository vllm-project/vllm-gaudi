# test_config.yaml
#
# Bundle optimization (based on build #482 actual timings):
#   - Original 23 pods consolidated to 5 pods (19 cards total)
#   - Card sizes: g3=1, g3.l=8, g2.l=8
#   - Tests grouped by flavor compatibility
#   - Each test wrapped with run_with_junit.sh for JUnit reporting
#   - Tests continue on failure; final --check exits non-zero if any failed
#
stages:
  - name: first_stage
    steps:
      # --- g2.l: cpu_offloading + spec_decode_ngram + fsdpa_slicing accuracy (~13min, 8 cards) ---
      #   Uses g2 due to accuracy issue on g3
      - name: e2e_g2_offloading_specdec_bundle
        flavor: g2.l
        command: >-
          bash tests/full_tests/run_with_junit.sh cpu_offloading
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_cpu_offloading_test &&
          bash tests/full_tests/run_with_junit.sh spec_decode_ngram
          env HF_HOME=/tmp HF_HUB_OFFLINE=0 VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_spec_decode_ngram_test &&
          pip install pytest-timeout &&
          HABANA_VISIBLE_DEVICES=0 pytest -vvv --timeout=300
          -o junit_family=xunit1 --junitxml=\${TEST_RESULTS_DIR}/test_fsdpa_slicing_accuracy.xml
          tests/unit_tests/test_fsdpa_slicing.py::TestFsdpaSlicingAccuracyBF16
          tests/unit_tests/test_fsdpa_slicing.py::TestFsdpaSlicingAccuracyFP8 &&
          bash tests/full_tests/run_with_junit.sh --check
      # --- g3.l: unit_tests + eagle3 + w4a16 + calibration + accuracy + TP=2 tests (~52min, 8 cards) ---
      #   Uses g3.l because unit_tests needs 8 cards for offloading test
      #   run_accuracy_test (NIXL PD) needs 3+ cards for prefill + decode TP=2
      #   TP=2 tests from accuracy bundle also run here
      - name: e2e_unittests_eagle3_calib_accuracy_bundle
        flavor: g3.l
        command: >-
          pip install pytest-timeout &&
          HABANA_VISIBLE_DEVICES=all pytest -vvv --timeout=300 --durations=10 --durations-min=1.0
          -o junit_family=xunit1 --junitxml=\${TEST_RESULTS_DIR}/test_unit_tests.xml
          tests/unit_tests
          --deselect=tests/unit_tests/test_fsdpa_slicing.py::TestFsdpaSlicingAccuracyBF16
          --deselect=tests/unit_tests/test_fsdpa_slicing.py::TestFsdpaSlicingAccuracyFP8 &&
          bash tests/full_tests/run_with_junit.sh spec_decode_eagle3
          env HF_HOME=/tmp HF_HUB_OFFLINE=0 VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_spec_decode_eagle3_test &&
          bash tests/full_tests/run_with_junit.sh spec_decode_eagle3_num_spec_2
          env HF_HOME=/tmp HF_HUB_OFFLINE=0 VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_spec_decode_eagle3_num_spec_2_test &&
          bash tests/full_tests/run_with_junit.sh w4a16_moe_gidx
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_compressed_w4a16_moe_gidx_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh w4a16_channelwise
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_compressed_w4a16_channelwise_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh calibration_arg_parsing
          bash tests/calibration_tests/test_calibrate_model_arg_parsing.sh &&
          pip install lm-eval[api] &&
          bash tests/full_tests/run_with_junit.sh deepseek_v2_inc_dynamic_tp2
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_deepseek_v2_inc_dynamic_tp2_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh gsm8k_qwen3_30b
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_gsm8k_qwen3_30b_test &&
          bash tests/full_tests/run_with_junit.sh tp2_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_tp2_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh qwen3_vl_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_vl_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh nixl_pd_accuracy
          bash -c 'cd tests/unit_tests && ./run_accuracy_test.sh' &&
          bash tests/full_tests/run_with_junit.sh --check
      # --- g3 Bin A: qwen3_moe + qwen3_quant + deepseek_v2 + qwen3.5 + gsm8k (~36min, 1 card) ---
      - name: e2e_qwen3moe_deepseek_bundle
        flavor: g3
        command: >-
          bash tests/full_tests/run_with_junit.sh qwen3_moe_dynamic_scaling
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_moe_compressed_tensor_dynamic_scaling_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh qwen3_moe_static_per_tensor
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_moe_compressed_tensor_static_per_tensor_scaling_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh qwen3_moe_static_scaling
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_moe_compressed_tensor_static_scaling_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh qwen3_dynamic_scaling
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_compressed_tensor_dynamic_scaling_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh mla_moe
          env HF_HOME=/tmp HF_HUB_OFFLINE=0 VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_mla_moe_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh deepseek_v2_inc
          env HF_HOME=/tmp HF_HUB_OFFLINE=0 VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_deepseek_v2_inc_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh gsm8k_deepseek
          env HF_HOME=/tmp HF_HUB_OFFLINE=0 VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_gsm8k_deepseek_test &&
          pip install lm-eval[api] &&
          bash tests/full_tests/run_with_junit.sh gsm8k_qwen35_35b_a3b
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_gsm8k_qwen35_35b_a3b_test &&
          bash tests/full_tests/run_with_junit.sh --check
      # --- g3 Bin B: multimodal + embedding + quant + perf + fp8 (~32min, 1 card) ---
      - name: e2e_multimodal_quant_perf_fp8_bundle
        flavor: g3
        command: >-
          bash tests/full_tests/run_with_junit.sh qwen2_5_vl_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen2_5_vl_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh qwen2_5_vl_compile_warmup
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen2_5_vl_compile_warmup_test &&
          bash tests/full_tests/run_with_junit.sh offloading_connector
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_offloading_connector_test &&
          bash tests/full_tests/run_with_junit.sh embedding_model
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_embedding_model_test &&
          bash tests/full_tests/run_with_junit.sh mistral3_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_mistral3_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh mistral3
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_mistral3_test &&
          bash tests/full_tests/run_with_junit.sh gptq_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_gptq_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh awq_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_awq_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh gemma3_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_gemma3_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh basic_load_generate
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_basic_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh llama3_70b_inc_dynamic_quant
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_llama3_70b_inc_dynamic_quant_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh ernie4_5_vl
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_ernie4.5_vl_test &&
          bash tests/full_tests/run_with_junit.sh perf_tests
          bash tests/full_tests/ci_perf_tests.sh &&
          bash tests/full_tests/run_with_junit.sh qwen3_inc_dynamic
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_inc_dynamic_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh qwen3_blockfp8_dynamic
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_blockfp8_dynamic_scaling_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh qwen3_8b_fp8_attn_static_fp8kv
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_qwen3_8b_fp8_attn_static_scaling_fp8kv_test &&
          bash tests/full_tests/run_with_junit.sh dsv2_blockfp8_static_fp8kv
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_dsv2_blockfp8_static_scaling_fp8kv_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh dsv2_blockfp8_static_fp8qkv
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_dsv2_blockfp8_static_scaling_fp8qkv_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh --check
      # --- g3 Bin C: granite + scaling + sleep + structured_output + preemption (~19min, 1 card) ---
      - name: e2e_granite_scaling_sleep_preemption_bundle
        flavor: g3
        command: >-
          bash tests/full_tests/run_with_junit.sh sleep_mode
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_sleep_mode_test &&
          bash tests/full_tests/run_with_junit.sh online_model_swap
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_online_model_swap_test &&
          bash tests/full_tests/run_with_junit.sh structured_output
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_structured_output_test &&
          bash tests/full_tests/run_with_junit.sh granite_inc
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_granite_inc_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh granite_inc_calibration_quant
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_granite_inc_calibration_and_quantization_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh granite_4_h
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_granite_4_h_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh gsm8k_granite
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_gsm8k_granite_test &&
          bash tests/full_tests/run_with_junit.sh gsm8k_granite_async
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_gsm8k_granite_async_test &&
          bash tests/full_tests/run_with_junit.sh llama3_per_tensor_scaling
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_llama3_per_tensor_scaling_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh llama3_modelopt_per_tensor_scaling
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_llama3_modelopt_per_tensor_scaling_load_generate_test &&
          bash tests/full_tests/run_with_junit.sh preemption
          env VLLM_GAUDI_PREFIX=. bash tests/full_tests/ci_e2e_discoverable_tests.sh run_preemption_test &&
          bash tests/full_tests/run_with_junit.sh --check
