name: Pre-merge trigger

on:
  workflow_dispatch: {}
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches:
      - main
      - releases/**
  merge_group:
    types: [checks_requested]
    branches:
      - main
      - releases/**

concurrency:
  group: pre-merge-trigger-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  execute_pre_merge:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch, find run, and wait for result
        uses: actions/github-script@v7
        with:
          script: |
            const pr         = context.payload.pull_request;
            const mergeGroup = context.payload.merge_group;

            if (!pr && !mergeGroup) {
              core.info('Manual trigger - no PR/merge_group context, nothing to do');
              return;
            }

            let headSha, baseRef, prNumber, prTitle, isDraft, skipTests, isMergeGroup;

            if (pr) {
              headSha      = pr.head.sha;
              baseRef      = pr.base.ref;
              prNumber     = String(pr.number);
              prTitle      = pr.title;
              isDraft      = String(pr.draft);
              skipTests    = String(pr.labels.some(l => l.name === 'skip-gaudi-tests'));
              isMergeGroup = 'false';
            } else {
              // merge_group: base_ref arrives as refs/heads/main → strip prefix
              headSha      = mergeGroup.head_sha;
              baseRef      = mergeGroup.base_ref.replace('refs/heads/', '');
              // Extract PR number from head_ref: refs/heads/gh-readonly-queue/main/pr-123-<sha>
              const match  = mergeGroup.head_ref.match(/\/pr-(\d+)-/);
              prNumber     = match ? match[1] : '';
              prTitle      = '';
              isDraft      = 'false';
              isMergeGroup = 'true';
              // Check skip-gaudi-tests label via API (label is not in the merge_group payload)
              if (prNumber) {
                const { data: pullRequest } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: parseInt(prNumber, 10),
                });
                skipTests = String(pullRequest.labels.some(l => l.name === 'skip-gaudi-tests'));
              } else {
                skipTests = 'false';
              }
            }

            // 1. Dispatch to base branch
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'pre-merge.yaml',
              ref:   baseRef,
              inputs: {
                pr_number:      prNumber,
                head_sha:       headSha,
                base_ref:       baseRef,
                pr_title:       prTitle,
                is_draft:       isDraft,
                skip_tests:     skipTests,
                is_merge_group: isMergeGroup,
              },
            });

            // 2. Find the dispatched run - display_title contains head_sha via run-name,
            //    making it unique even when multiple PRs dispatch to the same branch concurrently
            const titleKey = `[${headSha}]`;
            await new Promise(r => setTimeout(r, 15000)); // let GitHub register the run

            let runId;
            for (let i = 0; i < 12; i++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: 'pre-merge.yaml', branch: baseRef,
                event: 'workflow_dispatch', per_page: 10,
              });
              const run = data.workflow_runs.find(r => r.display_title?.includes(titleKey));
              if (run) { runId = run.id; core.info(`Found run ${runId}: ${run.html_url}`); break; }
              core.info(`Run not found yet (attempt ${i + 1}/12)`);
              await new Promise(r => setTimeout(r, 10000));
            }
            if (!runId) { core.setFailed('Could not find dispatched run within 2 minutes'); return; }

            // 3. Poll until complete (30 min max)
            for (let i = 0; i < 180; i++) {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner, repo: context.repo.repo, run_id: runId,
              });
              if (run.status === 'completed') {
                if (run.conclusion !== 'success')
                  core.setFailed(`pre-merge ${run.conclusion}: ${run.html_url}`);
                return;
              }
              core.info(`Status: ${run.status} (${i + 1}/180)`);
              await new Promise(r => setTimeout(r, 10000));
            }
            core.setFailed('Timed out (30 min) waiting for pre-merge.yaml');
