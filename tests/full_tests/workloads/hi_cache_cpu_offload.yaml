load:
  type: concurrent
  request_timeout: 3600
  interval: 60
  stages:
    - concurrency_level: 45
      num_requests: 200

api:
  type: completion
  streaming: true

server:
  type: vllm
  model_name: Qwen/Qwen3-32B
  base_url: http://localhost:8000
  ignore_eos: true

tokenizer:
  pretrained_model_name_or_path: Qwen/Qwen3-32B

data:
  type: shared_prefix
  shared_prefix:
    num_groups: 45
    num_prompts_per_group: 10
    system_prompt_len: 20000
    question_len: 256
    output_len: 1024

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: true
