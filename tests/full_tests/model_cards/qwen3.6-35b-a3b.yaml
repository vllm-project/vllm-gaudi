model_card:
  model_name: "Qwen/Qwen3.6-35B-A3B"
  tasks: "gsm8k_custom_stop"
  num_fewshot: 5
  trust_remote_code: true
  limit: 256
  max_num_seqs: 128
  max_model_len: 8192
  batch_size: 128
  dtype: bfloat16
  gpu_memory_utilization: 0.7
  max_num_batched_tokens: 8192
  max_gen_toks: 2048
  include_path: "${VLLM_GAUDI_PREFIX}/.jenkins/lm-eval-harness/tasks"

metrics:
  name: exact_match,strict-match
  value: 0.96
