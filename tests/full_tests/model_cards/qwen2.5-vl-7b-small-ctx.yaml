model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
test_config:
  - modality: image
    extra_engine_args:
      # Heavily limit context length and capacity for rapid startup
      max_model_len: 512
      max_num_seqs: 2
      # Limit image size to absolute minimum allowed by Qwen2.5-VL (28x28 blocks)
      mm_processor_kwargs:
          min_pixels: 784
          max_pixels: 262144
          fps: 1
      limit_mm_per_prompt:
        audio: 999
        video: 999
        image:
          count: 1
          width: 512
          height: 512
    input_data_config:
      num_prompts: 1
      media_source: default
